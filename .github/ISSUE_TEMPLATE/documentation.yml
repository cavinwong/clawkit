name: Documentation Issue
description: Report missing, incorrect, or unclear documentation
title: "docs: "
labels: ["documentation"]
body:
  - type: textarea
    id: description
    attributes:
      label: What is wrong or missing?
      description: Describe the documentation issue clearly.
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Documentation Location
      description: Link to the specific page or section with the issue.
      placeholder: "https://github.com/cavinwong/clawkit/blob/main/docs/tool-sdk.md"

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved?
