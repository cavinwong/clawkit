name: Feature Request
description: Suggest a new feature or enhancement for ClawKit
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea as clearly as possible.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this feature has not been requested before.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is the motivation?
      placeholder: "Currently, when I try to do X, I have to Y which is tedious because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see. Include API design ideas if applicable.
      render: typescript
      placeholder: |
        // Proposed API:
        import { Tool, Field } from '@openclaw-kit/core';

        const myTool = Tool.define({
          // new feature here
        });
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to your workflow?
      options:
        - Nice to have
        - Important
        - Critical / Blocking
    validations:
      required: true
