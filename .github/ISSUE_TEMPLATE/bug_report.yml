name: Bug Report
description: Report a bug or unexpected behavior in ClawKit
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the form below as completely as possible.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting.
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am using the latest version of ClawKit.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: When I call `Tool.define(...)`, it throws an error...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: |
        Please provide a minimal code snippet or steps to reproduce the issue.
        This is the most important part of the bug report!
      render: typescript
      placeholder: |
        import { Tool, Field } from '@openclaw-kit/core';

        const myTool = Tool.define({
          // ...
        });
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include the full error message and stack trace if applicable.
    validations:
      required: true

  - type: input
    id: clawkit-version
    attributes:
      label: ClawKit Version
      placeholder: "e.g. @openclaw-kit/core@0.1.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "e.g. 22.13.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
